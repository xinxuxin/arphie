<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Docs QA</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">Local document search</p>
        <h1>Personal Docs QA</h1>
        <p class="lede">
          Placeholder web app for a small document QA system. The shared core engine will be wired in next.
        </p>
        <form class="question-form">
          <label for="question">Question</label>
          <div class="question-row">
            <input id="question" name="question" type="text" placeholder="What did I write about the trip budget?">
            <button type="submit">Ask</button>
          </div>
        </form>
        <output id="answer" class="answer">Indexing and QA are not implemented yet.</output>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
